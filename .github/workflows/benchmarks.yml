name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  # Bencher regression detection. Requires:
  # - BENCHER_API_TOKEN repo secret (https://bencher.dev/docs)
  # - BENCHER_PROJECT repo variable (your Bencher project slug)
  bench:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.BENCHER_PROJECT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: bencherdev/bencher@99117a626dc634b8ad817f38abcf4876b3b0668b # v0.6.5
      - run: |
          bencher run \
            --project ${{ vars.BENCHER_PROJECT }} \
            --token ${{ secrets.BENCHER_API_TOKEN }} \
            --branch main \
            --adapter rust_criterion \
            "cargo bench --all-features"
  bench-pr:
    if: ${{ github.event_name == 'pull_request' && vars.BENCHER_PROJECT != '' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: bencherdev/bencher@99117a626dc634b8ad817f38abcf4876b3b0668b # v0.6.5
      - run: |
          bencher run \
            --project ${{ vars.BENCHER_PROJECT }} \
            --token ${{ secrets.BENCHER_API_TOKEN }} \
            --branch ${{ github.head_ref }} \
            --start-point main \
            --start-point-reset \
            --adapter rust_criterion \
            --error-on-alert \
            --github-actions ${{ secrets.GITHUB_TOKEN }} \
            "cargo bench --all-features"